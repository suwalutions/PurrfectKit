[project]
name = "purrfectkit"
version = "0.1.15"
description = "**PurrfectKit** is a whimsical Python library that blends feline charm with powerful NLP functionality."
readme = "README.md"
authors = [{ name = "SUWALUTIONS", email = "suwa@suwalutions.com" }]
maintainers = [{ name = "KHARAPSY", email = "kharapsy@suwalutions.com" }]
license = "MIT"
requires-python = ">=3.10"
keywords = ["rag", "nlp", "llms", "python", "ai", "ocr", "document-processing", "multilingual", "text-extraction"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Text Processing :: Linguistic",
    "Topic :: Text Processing :: General",
]

dependencies = [
    "transformers<=4.56.0",
]

[project.optional-dependencies]
Suphalak = [ # reading
    "torch<=2.7.0",
    "torchaudio<=2.7.0",
    "torchvision<=0.22.0"
    
    "docling<=2.31.1",
    "markitdown<=0.1.1",
    "pymupdf4llm<=0.0.27",

    "pillow<=10.4.0",
    "pdf2image<=1.17.0",
    "pytesseract<=0.3.13",
    "easyocr<=1.7.2",
    "surya-ocr<=0.14.0",
    "python-doctr<=1.0.0",

    "PyMuPDF<=1.26.4",
    "pandas<=2.2.3"
]

Malet = [ # chunking
    "langchain-text-splitters<=0.3.8"
]

WichienMaat = [ # embedding
    "sentence_transformers<=5.1.0"
]

KhaoManee = [ # searching
    "scikit-learn<=1.7.1"
]

Kornja = [ # generating
]

Dev = [
]
Docs = [
]

All = [
    "purrfectkit[Suphalak, Malet, WichienMaat, KhaoManee]"
]

[project.urls]
Homepage = "https://github.com/SUWALUTIONS/PurrfectKit"
Documentation = "https://purrfectkit.SUWALUTIONS.com/"
Repository = "https://github.com/SUWALUTIONS/PurrfectKit"
Issues = "https://github.com/SUWALUTIONS/PurrfectKit/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
exclude = [
    ".cache"
]
packages = ["purrfectmeow"]

[tool.hatch.metadata]
allow-direct-references = true
