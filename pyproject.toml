[project]
name = "purrfectkit"
version = "0.1.15"
description = "**PurrfectKit** is a whimsical Python library that blends feline charm with powerful NLP functionality."
readme = "README.md"
authors = [{ name = "SUWALUTIONS", email = "suwa@suwalutions.com" }]
maintainers = [{ name = "KHARAPSY", email = "kharapsy@suwalutions.com" }]
license = "MIT"
requires-python = ">=3.10,<=3.12.4"
keywords = ["rag", "nlp", "llms", "python", "ai", "ocr", "document-processing", "multilingual", "text-extraction"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Text Processing :: Linguistic",
    "Topic :: Text Processing :: General",
]
dependencies = [
    "pythainlp<=5.1.2",
    "python-magic<=0.4.27",
    "sentence-transformers>=4.1.0",
    "spacy<=3.8.7",
    "transformers<=4.52.3",
]

[project.optional-dependencies]
Kornja = [
    "langchain-text-splitters<=0.3.8",
    "tiktoken>=0.9.0",
]

WichienMaat = [
    "faiss-cpu>=1.11.0",
    "langchain-core<=0.3.61",
    "pandas<=2.2.3",
    "scikit-learn>=1.6.1",
    "numpy>=1.24.0",
]

KhaoManee = [
    "torch<=2.7.0", # Pinned to CPU wheel version
    "torchvision<=0.22.0", # Pinned to CPU wheel version
    "torchaudio<=2.7.0", # Pinned to CPU wheel version
]

Malet = [
    "docling<=2.34.0",
    "markitdown[all]<=0.1.1",
    "pdf2image<=1.17.0",
    "pillow<=10.4.0", # For pytesseract and surya-ocr
    "pymupdf<=1.26.0",
    "easyocr<=1.7.2",
    "pytesseract<=0.3.13",
    "python-doctr[torch]>=0.12.0",
    "surya-ocr<=0.14.2",
]

Dev = [
    "pytest<=8.3.5",
    "ipykernel>=6.29.5",
    "ipywidgets>=8.1.7",
    "jupyterlab-widgets>=3.0.15",
]
Docs = [
    "sphinx<=8.2.3",
    "furo<=2024.8.6",
    "sphinx-copybutton>=0.5.2",
]

All = [
    "purrfectkit[Kornja,WichienMaat,KhaoManee,Malet,Dev,Docs]"
]

[project.urls]
Homepage = "https://github.com/SUWALUTIONS/PurrfectKit"
Documentation = "https://purrfectkit.SUWALUTIONS.com/"
Repository = "https://github.com/SUWALUTIONS/PurrfectKit"
Issues = "https://github.com/SUWALUTIONS/PurrfectKit/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
exclude = [
    "logs",
    "tmp_dir",
    ".cache/models/",
]
packages = ["purrfectmeow"]

[tool.hatch.metadata]
allow-direct-references = true
