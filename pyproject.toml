[project]
name = "PurrfectKit"
version = "0.0.1"
description = "**PurrfectKit** is a whimsical Python library that blends feline charm with powerful NLP functionality."
readme = "README.md"
authors = [{ name = "SUWALUTIONS", email = "suwa@suwalutions.com" }]
maintainers = [{name = "KHARAPSY", email = "kharapsy@suwalutions.com"}]
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["rag", "nlp", "llms", "python", "ai"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "PyMuPDF>=1.25.5",
    "pandas>=2.2.3",
    "numpy>=2.2.5",
    "pdf2image>=1.17.0",
    "pytesseract>=0.3.13",
    "easyocr>=1.7.2",
    "surya-ocr>=0.14.0",
    "docling>=2.31.1",
    "markitdown>=0.1.1",
    "pillow>=10.0.0",
    "transformers[torch]>=4.51.3",
    "langchain-text-splitters>=0.3.8",
    "python-multipart>=0.0.20",
    "tiktoken>=0.9.0",
    "httpx>=0.28.1",
]
[project.optional-dependencies]
dev = [
    "pytest>=8.3.5",
]
docs = [
    "sphinx>=8.2.3",
    "furo>=2024.8.6",
]

[project.urls]
Homepage = "https://github.com/SUWALUTIONS/PurrfectKit"
Documentation = "https://purrfectkit.SUWALUTIONS.com/"
Repository = "https://github.com/SUWALUTIONS/PurrfectKit"
Issues = "https://github.com/SUWALUTIONS/PurrfectKit/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["purrfectmeow"]

[tool.hatch.metadata]
allow-direct-references = true