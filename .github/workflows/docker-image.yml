name: Docker Image

on:
  push:
    #branches: 'meow0.2'
    tags: [ 'latest', 'v*' ]

jobs:
  check-branch:
    runs-on: self-hosted
    outputs:
      valid_branch: ${{ steps.set-branch-valid.outputs.valid }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
    
      - name: Check if tag is from meow branch
        id: set-branch-valid
        run: |
          echo "Checking if tag ${{ github.ref_name }} is from meow..."

          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref_name }})

          if git merge-base --is-ancestor $TAG_COMMIT origin/meow0.2; then
            echo "Tag is from meow branch."
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "Tag is NOT from meow branch."
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

  build-image:
    runs-on: self-hosted
    needs: check-branch
    if: needs.check-branch.outputs.valid_branch == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker image
        run: |
          echo "Building Docker image with tag: ${{ github.ref_name }}"
          docker build -t purrfectkit:${{ github.ref_name }} .
