name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
      - "!*dev*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Build & Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag is on branch 'meow'
        id: verify_branch
        run: |
          TAG_COMMIT=$(git rev-parse HEAD)
          if git merge-base --is-ancestor $TAG_COMMIT origin/meow; then
            echo "✅ Tag commit is on branch 'meow'."
          else
            echo "❌ Tag commit is NOT on branch 'meow'. Exiting."
            exit 1
          fi

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Build
        run: uv build --wheel --sdist

      - name: Publish to TestPyPI (prerelease)
        if: contains(github.ref_name, '-')
        env:
          UV_PYPIRC: |
            [testpypi]
            username = __token__
            password = ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: uv publish --repository testpypi

      - name: Publish to PyPI (final)
        if: "!contains(github.ref_name, '-')"
        env:
          UV_PYPIRC: |
            [pypi]
            username = __token__
            password = ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
