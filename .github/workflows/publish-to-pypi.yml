name: Publish to PyPI
on:
  push:
    tags: [ "v*" ]
    branches: [ meow ]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Build & Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Build
        run: uv build --wheel --sdist

      - name: Publish to TestPyPI (prerelease)
        if: contains(github.ref_name, '-')
        env:
          UV_PYPIRC: |
            [testpypi]
            username = __token__
            password = ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: uv publish --repository testpypi

      - name: Publish to PyPI (final)
        if: "!contains(github.ref_name, '-')"
        env:
          UV_PYPIRC: |
            [pypi]
            username = __token__
            password = ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
